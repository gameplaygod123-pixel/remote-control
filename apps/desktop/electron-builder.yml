appId: com.personalremote.app
productName: Personal Remote
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# asar disabled entirely: the agent's input-helper is a *plain Node* child
# process (ELECTRON_RUN_AS_NODE, no Chromium -- see src/input-helper/) and
# plain Node has no asar filesystem support, so it could neither be forked
# from inside an archive nor require() its JS dependencies out of one.
# Unpacking just its dependency tree would mean hand-maintaining a glob list
# of transitive deps; shipping unarchived files sidesteps the whole class of
# problem for a negligible startup cost at this app's size.
asar: false
asarUnpack:
  - resources/**
win:
  executableName: PersonalRemote
  # Most real Windows PCs are x64 -- default to that explicitly rather than
  # whatever architecture happens to match the machine doing the building
  # (electron-builder defaults to the host arch, which is arm64 when built
  # from an Apple Silicon Mac -- wrong for the vast majority of Windows
  # machines this would actually be installed on).
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Update feed for electron-updater. Publishing a release (electron-builder
# --publish always) needs a GH_TOKEN env var with repo write access on the
# machine doing the build; the app itself only *reads* this feed at
# runtime, which needs no token as long as the repo/releases are public.
publish:
  provider: github
  owner: gameplaygod123-pixel
  repo: remote-control
  # electron-builder defaults to publishing as a draft, which is invisible
  # to both the public releases list and electron-updater's feed -- would
  # otherwise need a manual `gh release edit --draft=false` after every
  # release. This publishes it live immediately instead.
  releaseType: release
